
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEF·VC 공시 모니터</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root{
      --bg:#fff3f9;
      --bg2:#ffd7ea;
      --card:#ffffff;
      --ink:#2f1124;
      --muted:#95657e;
      --line:#f3b4d4;
      --pink:#ff66b8;
      --pink2:#f04fa5;
      --violet:#7c5cff;
      --yellow:#fff2a8;
      --green:#23a96e;
      --red:#dd3c64;
      --shadow:0 14px 36px rgba(174,54,118,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(255,102,184,.22), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(124,92,255,.13), transparent 30%),
        linear-gradient(180deg,var(--bg) 0%,#fff 58%,var(--bg2) 100%);
      font-size:15px;
      line-height:1.5;
    }
    a{color:inherit}
    .shell{max-width:1220px;margin:0 auto;padding:34px 18px 58px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:58px;height:58px;border-radius:16px;box-shadow:0 10px 28px rgba(240,79,165,.22)}
    h1{font-size:28px;letter-spacing:-.7px;line-height:1.15}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .range{display:flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
    button,.btn{
      appearance:none;border:0;background:#fff;color:var(--ink);font-family:inherit;font-weight:800;cursor:pointer;
      border-radius:999px;transition:.12s transform,.12s box-shadow,.12s background;
    }
    .range button{padding:8px 12px;color:var(--muted)}
    .range button.on{background:var(--pink);color:#fff;box-shadow:0 6px 18px rgba(240,79,165,.25)}
    .btn{border:1px solid var(--line);padding:10px 14px;box-shadow:var(--shadow);font-size:13px}
    .btn:hover,.range button:hover{transform:translateY(-1px)}
    .btn.spin::before{content:"⟳ ";display:inline-block;animation:rot 1s linear infinite}
    @keyframes rot{to{transform:rotate(360deg)}}
    .auto{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 12px;box-shadow:var(--shadow)}
    .auto input{accent-color:var(--pink)}

    .panel{background:rgba(255,255,255,.84);border:1px solid rgba(243,180,212,.9);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
    .topgrid{display:grid;grid-template-columns:1.3fr .9fr;gap:14px;margin-bottom:14px}
    @media(max-width:920px){.topgrid{grid-template-columns:1fr}}
    .searchbox{padding:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .searchbox input[type="search"]{flex:1;min-width:220px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:11px 15px;font-family:inherit;font-size:14px;outline:none}
    .searchbox input[type="search"]:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,102,184,.12)}
    .meta{color:var(--muted);font-size:12.5px;font-variant-numeric:tabular-nums;min-height:20px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px}
    @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
    .stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:11px 12px}
    .stat b{display:block;font-size:20px;line-height:1;color:var(--pink2);font-variant-numeric:tabular-nums}
    .stat span{display:block;margin-top:5px;color:var(--muted);font-size:12px;font-weight:700}
    .warning{display:none;margin:0 0 14px;padding:12px 14px;border:1px solid #ffd08a;background:#fff8e5;color:#7a4b00;border-radius:18px;font-size:13px;font-weight:750}
    .warning.on{display:block}

    .favbox{padding:14px 16px;margin-bottom:14px}
    .favtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .favtitle{font-size:13px;font-weight:900;color:var(--ink)}
    .favform{display:flex;gap:8px;flex-wrap:wrap}
    .favform input{border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-family:inherit;font-size:13px;outline:none;min-width:180px}
    .chips{display:flex;gap:7px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:850;color:#7a3159}
    .chip button{width:16px;height:16px;display:grid;place-items:center;background:#ffe4f2;color:#b33275;font-size:11px;line-height:1}

    .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
    @media(max-width:920px){.cols{grid-template-columns:1fr}}
    .col{padding:14px}
    .colhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;position:sticky;top:10px;z-index:5;background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:18px;padding:10px 12px;backdrop-filter:blur(14px)}
    .coltitle{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:950;letter-spacing:-.3px}
    .coltitle .dot{width:10px;height:10px;border-radius:99px;background:var(--pink);box-shadow:0 0 0 5px rgba(255,102,184,.16)}
    .vc .coltitle .dot{background:var(--violet);box-shadow:0 0 0 5px rgba(124,92,255,.13)}
    .count{background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950;color:var(--pink2)}
    .vc .count{color:var(--violet)}
    .day{margin:14px 2px 8px;color:#6e3956;font-size:13px;font-weight:950}
    .day::before{content:"✦ ";color:var(--pink)}
    .card{display:block;text-decoration:none;background:#fff;border:1px solid rgba(243,180,212,.95);border-radius:20px;padding:13px 14px;margin-bottom:10px;box-shadow:0 8px 22px rgba(174,54,118,.1);transition:.12s transform,.12s box-shadow,.12s border-color;position:relative;overflow:hidden}
    .card:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(174,54,118,.16);border-color:var(--pink)}
    .card.fav{border-color:#ff9ed0;background:linear-gradient(180deg,#fff 0%,#fff8fc 100%)}
    .card.fav::after{content:"관심";position:absolute;right:12px;top:10px;background:var(--yellow);border:1px solid #efd864;color:#6a4a00;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:950}
    .row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .corp{font-size:15px;font-weight:950;letter-spacing:-.2px;padding-right:44px}
    .report{margin-top:5px;font-size:14px;font-weight:800;color:#4b1d36;letter-spacing:-.15px}
    .small{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
    .why{margin-top:9px;padding:9px 10px;background:#fff5fa;border:1px dashed #f1a9d0;border-radius:13px;color:#74405d;font-size:12px;font-weight:700}
    .hint{margin-top:6px;color:#5f2744;font-size:12px;font-weight:850}
    mark{background:linear-gradient(180deg,transparent 42%,#fff18b 42%);padding:0 1px;border-radius:3px;color:inherit}
    .badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:950;border:1px solid transparent}
    .b-mkt{background:#f6f0ff;color:#6041c5;border-color:#e6d9ff}
    .b-score{background:#ffe9f5;color:#b72d78;border-color:#ffc3e3}
    .b-score.hot{background:#ffe1e8;color:#c42448;border-color:#ffb0c0}
    .b-score.mid{background:#fff4ce;color:#8a6200;border-color:#f1da91}
    .b-tag{background:#f5f7fb;color:#556070;border-color:#e4e9f2}
    .b-house{background:#ecfff6;color:#087a4b;border-color:#bcebd6}
    .empty,.err{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;color:var(--muted);font-size:13px;font-weight:750;text-align:center}
    .err{color:#b32646;background:#fff3f5;border-color:#ffc4cf}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <img src="/favicon.svg" alt="" />
        <div>
          <h1>PEF·VC 공시 모니터</h1>
          <p class="sub">DART 최근 공시에서 사모펀드·VC·창투·신기사 관련 건을 우선순위로 정리합니다.</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="range" id="rangeToggle">
          <button data-d="3">3일</button>
          <button data-d="5">5일</button>
          <button data-d="7" class="on">7일</button>
        </div>
        <button class="btn" id="refresh">새로고침</button>
        <label class="auto"><input type="checkbox" id="auto" checked /> 5분 자동갱신</label>
      </div>
    </header>

    <section class="topgrid">
      <div class="panel searchbox">
        <input id="q" type="search" placeholder="회사명·제출자·보고서명 검색" />
        <div class="meta" id="metaText">불러오는 중…</div>
      </div>
      <div class="panel stats">
        <div class="stat"><b id="statHot">-</b><span>최우선</span></div>
        <div class="stat"><b id="statWatch">-</b><span>관심 하우스</span></div>
        <div class="stat"><b id="statAll">-</b><span>선별 공시</span></div>
        <div class="stat"><b id="statScanned">-</b><span>스캔 공시</span></div>
      </div>
    </section>

    <div class="warning" id="warnBox"></div>

    <section class="panel favbox">
      <div class="favtop">
        <div class="favtitle">관심 하우스</div>
        <form class="favform" id="favForm">
          <input id="favInput" placeholder="예: MBK, IMM, 스틱" />
          <button class="btn" type="submit">추가</button>
          <button class="btn" type="button" id="resetFav">기본값</button>
        </form>
      </div>
      <div class="chips" id="favChips"></div>
    </section>

    <main class="cols">
      <section class="panel col pef">
        <div class="colhead">
          <div class="coltitle"><span class="dot"></span> PEF · 사모</div>
          <div class="count" id="cntPEF">-</div>
        </div>
        <div id="listPEF"><div class="empty">불러오는 중…</div></div>
      </section>

      <section class="panel col vc">
        <div class="colhead">
          <div class="coltitle"><span class="dot"></span> VC · 창투 · 신기사</div>
          <div class="count" id="cntVC">-</div>
        </div>
        <div id="listVC"><div class="empty">불러오는 중…</div></div>
      </section>
    </main>
  </div>

<script>
const API = "/api/dart";
const STORAGE_KEY = "pef_monitor_favorites_v2";
const DEFAULT_FAVORITES = [
  "MBK", "한앤컴퍼니", "IMM", "VIG", "스틱", "스톤브릿지", "글랜우드", "UCK",
  "JKL", "큐캐피탈", "프리미어파트너스", "에이티넘", "DSC", "아주IB", "한국투자파트너스",
  "미래에셋벤처투자", "LB인베스트먼트", "컴퍼니케이", "캡스톤파트너스"
];

let DATA = [];
let days = 7;
let q = "";
let timer = null;
let lastMeta = null;
let favorites = loadFavorites();

const $ = (s) => document.querySelector(s);
const esc = (s="") => String(s).replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const num = (n) => Number(n || 0).toLocaleString("ko-KR");

function loadFavorites(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : DEFAULT_FAVORITES;
    return Array.isArray(parsed) ? parsed.filter(Boolean) : DEFAULT_FAVORITES;
  }catch{
    return DEFAULT_FAVORITES;
  }
}
function saveFavorites(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites)); }
function hasFavorite(it){
  const hay = `${it.corp_name || ""} ${it.flr_nm || ""} ${it.report_nm || ""}`.toLowerCase();
  return favorites.some(f => f && hay.includes(String(f).toLowerCase()));
}
function renderFavorites(){
  $("#favChips").innerHTML = favorites.map((f, i) => `
    <span class="chip">${esc(f)} <button type="button" data-i="${i}" aria-label="삭제">×</button></span>
  `).join("") || `<span class="chip">등록된 관심 하우스 없음</span>`;
  document.querySelectorAll("#favChips button").forEach(btn => btn.onclick = () => {
    favorites.splice(Number(btn.dataset.i), 1);
    saveFavorites();
    renderFavorites();
    render();
  });
}
function fmtDate(d){ return d ? `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}` : ""; }
function weekday(d){
  const w = ["일","월","화","수","목","금","토"];
  return w[new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T00:00:00+09:00`).getDay()];
}
function todayKST(){ return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10).replace(/-/g,""); }
const CLS = {Y:"유가",K:"코스닥",N:"코넥스",E:"기타"};

function highlight(text, hits=[]){
  let out = esc(text || "");
  const sorted = [...hits].sort((a,b)=>b.length-a.length).slice(0, 8);
  for(const h of sorted){
    if(!h) continue;
    const safe = esc(h).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    out = out.replace(new RegExp(safe, "gi"), (m)=>`<mark>${m}</mark>`);
  }
  return out;
}
function scoreClass(score){
  if(score >= 80) return "hot";
  if(score >= 60) return "mid";
  return "";
}
function sectionHTML(items){
  if(!items.length) return `<div class="empty">해당 공시가 없습니다.</div>`;
  const today = todayKST();
  const groups = {};
  for(const it of items) (groups[it.rcept_dt] ||= []).push(it);
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  return dates.map(d => {
    const rows = groups[d].sort((a,b) => {
      const ar = (a.isFavorite ? 1000 : 0) + a.score;
      const br = (b.isFavorite ? 1000 : 0) + b.score;
      if(br !== ar) return br - ar;
      return b.rcept_no.localeCompare(a.rcept_no);
    }).map(it => `
      <a class="card ${it.isFavorite ? "fav" : ""}" href="${it.url}" target="_blank" rel="noopener">
        <div class="row">
          ${CLS[it.corp_cls] ? `<span class="badge b-mkt">${CLS[it.corp_cls]}</span>` : ""}
          <span class="badge b-score ${scoreClass(it.score)}">${it.grade || "검토"} ${it.score}</span>
          ${it.pef_entity ? `<span class="badge b-house">하우스</span>` : ""}
          ${(it.report_tags || []).slice(0,3).map(t => `<span class="badge b-tag">${esc(t)}</span>`).join("")}
        </div>
        <div class="corp">${highlight(it.corp_name, it.hits)}</div>
        <div class="report">${highlight(it.report_nm, it.hits)}</div>
        <div class="small">
          <span>제출: ${highlight(it.flr_nm, it.hits)}</span>
          ${it.rm ? `<span>${esc(it.rm)}</span>` : ""}
        </div>
        <div class="why">${esc(it.reason || "포착 사유 확인 필요")}</div>
        <div class="hint">체크포인트: ${esc(it.story_hint || "공시 원문 확인")}</div>
      </a>
    `).join("");

    return `<div class="day">${fmtDate(d)} (${weekday(d)}) · ${groups[d].length}건</div>${rows}`;
  }).join("");
}

function applyClientFlags(items){
  return items.map(it => ({ ...it, isFavorite: hasFavorite(it) }));
}
function render(){
  const kw = q.trim().toLowerCase();
  let items = applyClientFlags(DATA);
  if(kw){
    items = items.filter(it => `${it.corp_name || ""} ${it.report_nm || ""} ${it.flr_nm || ""} ${(it.hits || []).join(" ")} ${(it.report_tags || []).join(" ")}`.toLowerCase().includes(kw));
  }

  const pef = items.filter(it => it.category === "PEF");
  const vc = items.filter(it => it.category === "VC");

  $("#listPEF").innerHTML = sectionHTML(pef);
  $("#listVC").innerHTML = sectionHTML(vc);
  $("#cntPEF").textContent = `${num(pef.length)}건`;
  $("#cntVC").textContent = `${num(vc.length)}건`;
  $("#statHot").textContent = num(items.filter(it => it.score >= 80).length);
  $("#statWatch").textContent = num(items.filter(it => it.isFavorite).length);
  $("#statAll").textContent = num(items.length);
  $("#statScanned").textContent = num(lastMeta?.scanned || 0);
}

async function load(){
  const btn = $("#refresh");
  btn.classList.add("spin");
  btn.textContent = "갱신 중";
  $("#warnBox").classList.remove("on");

  try{
    const r = await fetch(`${API}?days=${days}`);
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || "불러오기 실패");

    DATA = Array.isArray(j.items) ? j.items : [];
    lastMeta = j;
    const t = new Date(j.fetched_at);
    $("#metaText").textContent =
      `${fmtDate(j.range.bgn)} ~ ${fmtDate(j.range.end)} · 전체 ${num(j.total_count ?? j.scanned)}건 중 ${num(j.scanned)}건 스캔 · ` +
      `갱신 ${t.toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit"})}`;

    if(j.failed_count > 0){
      const pages = (j.failed_pages || []).slice(0, 8).join(", ");
      $("#warnBox").textContent = `일부 페이지 조회 실패: ${j.failed_count}개 페이지${pages ? ` (${pages}${j.failed_count > 8 ? " 외" : ""})` : ""}. 누락 가능성이 있어 새로고침을 다시 누르는 것이 좋습니다.`;
      $("#warnBox").classList.add("on");
    }

    render();
  }catch(e){
    $("#listPEF").innerHTML = `<div class="err">공시를 불러오지 못했습니다: ${esc(e.message)}<br>잠시 후 새로고침을 다시 눌러보세요.</div>`;
    $("#listVC").innerHTML = "";
    $("#metaText").textContent = "";
    $("#cntPEF").textContent = "-";
    $("#cntVC").textContent = "-";
  }finally{
    btn.classList.remove("spin");
    btn.textContent = "새로고침";
  }
}

$("#refresh").onclick = load;
$("#q").addEventListener("input", e => { q = e.target.value; render(); });
document.querySelectorAll("#rangeToggle button").forEach(b => b.onclick = () => {
  document.querySelectorAll("#rangeToggle button").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  days = Number(b.dataset.d);
  load();
});
function setAuto(on){ clearInterval(timer); if(on) timer = setInterval(load, 5*60*1000); }
$("#auto").onchange = e => setAuto(e.target.checked);
$("#favForm").onsubmit = e => {
  e.preventDefault();
  const v = $("#favInput").value.trim();
  if(!v) return;
  if(!favorites.some(f => f.toLowerCase() === v.toLowerCase())) favorites.push(v);
  $("#favInput").value = "";
  saveFavorites();
  renderFavorites();
  render();
};
$("#resetFav").onclick = () => {
  favorites = [...DEFAULT_FAVORITES];
  saveFavorites();
  renderFavorites();
  render();
};

renderFavorites();
setAuto(true);
load();
</script>
</body>
</html>
