
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEF·VC 공시 모니터</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23FFA6D5'/><stop offset='.5' stop-color='%23FF2D8A'/><stop offset='1' stop-color='%23FFD84D'/></linearGradient></defs><path d='M50 4 L61 36 L95 38 L68 59 L78 93 L50 73 L22 93 L32 59 L5 38 L39 36 Z' fill='url(%23g)' stroke='%237A1B4E' stroke-width='4' stroke-linejoin='round'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFCFE3;          /* 진한 버블검 핑크 (참고 이미지 톤) */
    --dot:#FFB9D6;
    --card:#FFFFFF;
    --ink:#3D0A29;
    --outline:#B04A6E;     /* 테두리 장식 라인 (다크 로즈) */
    --muted:#A65C86;
    --pink:#FF2D8A;
    --violet:#8A4DFF;
    --hl:#FFF15C;
    --shadow:#F59BC6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;
    background:var(--bg);
    background-image:radial-gradient(var(--dot) 2px, transparent 2px);
    background-size:26px 26px;
    color:var(--ink);font-size:15px;line-height:1.5;
  }

  /* ===== 테두리 장식 (고정, 클릭 통과) ===== */
  .deco{position:fixed;pointer-events:none;z-index:0}
  .crest{top:6px;left:50%;transform:translateX(-50%);width:min(380px,80vw)}
  .bow-tl{top:74px;left:10px;width:64px}
  .bow-tr{top:74px;right:10px;width:64px;transform:scaleX(-1)}
  .ribbon-l{top:140px;bottom:150px;left:12px;width:40px}
  .ribbon-r{top:140px;bottom:150px;right:12px;width:40px;transform:scaleX(-1)}
  .ribbon-l svg,.ribbon-r svg{width:100%;height:100%}
  .star-l{top:46%;left:14px;width:26px}
  .star-r{top:46%;right:14px;width:26px}
  .wings{bottom:0;left:50%;transform:translateX(-50%);width:min(460px,92vw);opacity:.95}
  @media(max-width:1340px){
    .ribbon-l,.ribbon-r,.star-l,.star-r,.bow-tl,.bow-tr{display:none}
  }

  /* ===== 헤더 ===== */
  header{position:relative;z-index:1;padding:64px 16px 10px;text-align:center}
  header h1{
    font-family:Jua,"Pretendard Variable",sans-serif;font-weight:400;
    font-size:clamp(26px,4.5vw,38px);letter-spacing:1px;display:inline-block;
    background:linear-gradient(90deg,#FF7BBF 0%,#C89BFF 30%,#8FD0FF 55%,#FFE07A 80%,#FF9ECF 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-stroke:1px rgba(122,27,78,.35);
    filter:drop-shadow(2px 2px 0 rgba(255,255,255,.9));
  }
  .controls{
    position:relative;z-index:1;display:flex;justify-content:center;align-items:center;
    gap:12px;flex-wrap:wrap;padding:8px 16px 4px;
  }
  .range-toggle{display:flex;border:2px solid var(--ink);border-radius:99px;overflow:hidden;background:#fff;box-shadow:2px 2px 0 var(--shadow)}
  .range-toggle button{background:transparent;border:0;color:var(--muted);padding:6px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .range-toggle button.on{background:var(--pink);color:#fff}
  .hbtn{
    background:#fff;border:2px solid var(--ink);color:var(--pink);
    border-radius:99px;padding:6px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;
    box-shadow:2px 2px 0 var(--ink);transition:transform .08s, box-shadow .08s;
  }
  .hbtn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
  .hbtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
  .hbtn.spin::before{content:"⟳ ";display:inline-block;animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  label.auto{font-size:12.5px;display:flex;align-items:center;gap:6px;color:var(--ink);cursor:pointer;user-select:none;font-weight:700;accent-color:var(--pink)}

  /* ===== 본문 ===== */
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:14px 60px 170px}
  @media(max-width:1340px){.wrap{padding-left:16px;padding-right:16px}}
  .meta{
    font-size:12.5px;color:var(--muted);margin-bottom:16px;font-variant-numeric:tabular-nums;
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  }
  input.search{
    border:2px solid var(--ink);border-radius:99px;padding:8px 15px;font-size:13px;font-family:inherit;
    background:var(--card);width:280px;max-width:100%;box-shadow:2px 2px 0 var(--shadow);
  }
  input.search::placeholder{color:#C98BAC}
  input.search:focus{outline:none;box-shadow:2px 2px 0 var(--pink)}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  @media(max-width:900px){.cols{grid-template-columns:1fr}}

  .col-head{
    display:flex;align-items:center;gap:10px;padding:8px 14px;margin-bottom:12px;
    border:2.5px solid var(--ink);border-radius:14px;color:#fff;
    box-shadow:3px 3px 0 var(--ink);position:sticky;top:8px;z-index:5;
  }
  .col-head.pef{background:var(--pink)}
  .col-head.vc{background:var(--violet)}
  .col-head h2{font-family:Jua,sans-serif;font-size:16px;font-weight:400;letter-spacing:.4px}
  .col-head .cnt{font-size:12px;font-weight:800;background:#fff;border-radius:99px;padding:2px 10px;font-variant-numeric:tabular-nums}
  .col-head.pef .cnt{color:var(--pink)}
  .col-head.vc .cnt{color:var(--violet)}
  .col-head .spark{margin-left:auto;font-size:14px}

  .dayhead{font-family:Jua,sans-serif;font-size:13px;color:var(--ink);padding:12px 4px 7px;letter-spacing:.3px}
  .dayhead::before{content:"✦ ";color:var(--pink)}

  a.item{
    display:block;background:var(--card);
    border:2px solid var(--ink);border-radius:14px;
    padding:11px 14px;margin-bottom:10px;text-decoration:none;color:inherit;position:relative;
    box-shadow:3px 3px 0 var(--shadow);
    transition:transform .1s, box-shadow .1s;
  }
  a.item:hover{transform:translate(-2px,-2px) rotate(-.3deg);box-shadow:5px 5px 0 var(--pink)}
  a.item.today::after{
    content:"✦ today";position:absolute;top:-10px;right:12px;color:var(--pink);
    font-size:10px;font-weight:800;background:var(--hl);padding:1px 8px;border:2px solid var(--ink);border-radius:99px;
  }
  .row1{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px}
  .badge{font-size:10px;font-weight:800;border-radius:99px;padding:2px 8px;letter-spacing:.3px;border:1.5px solid var(--ink)}
  .b-mkt{background:#FFE9F3;color:var(--muted)}
  .b-house{background:var(--hl);color:var(--ink)}
  .corp{font-weight:800;font-size:14px;letter-spacing:-.2px}
  .report{font-size:13.5px;color:#5C2143;margin-bottom:3px;word-break:keep-all}
  mark{background:var(--hl);padding:0 3px;border-radius:4px;font-weight:700}
  .row3{font-size:11.5px;color:var(--muted);display:flex;gap:10px;font-variant-numeric:tabular-nums;flex-wrap:wrap}
  .empty{
    text-align:center;color:var(--muted);padding:44px 0;font-size:13.5px;
    background:rgba(255,255,255,.65);border:2px dashed var(--pink);border-radius:14px;
  }
  .empty::before{content:"🎀";display:block;font-size:22px;margin-bottom:6px}
  .err{background:#fff;border:2px solid #E0245E;color:#B01648;border-radius:14px;padding:14px;font-size:13.5px;box-shadow:3px 3px 0 #F8B8CC}
</style>
</head>
<body>

<!-- ===== 헤더 ===== -->
<header>
  <h1>PEF·VC 공시 모니터</h1>
</header>
<div class="controls">
  <div class="range-toggle" id="rangeToggle">
    <button data-d="3">3일</button>
    <button data-d="5">5일</button>
    <button data-d="7" class="on">7일</button>
  </div>
  <label class="auto"><input type="checkbox" id="auto" checked> 5분 자동갱신</label>
  <button class="hbtn" id="refresh">새로고침</button>
</div>

<div class="wrap">
  <div class="meta">
    <span id="metaText">불러오는 중…</span>
    <span style="flex:1"></span>
    <input class="search" id="q" placeholder="🔍 목록 내 검색 (선택)">
  </div>

  <div class="cols">
    <div>
      <div class="col-head pef"><h2>PEF · 사모</h2><span class="cnt" id="cntPEF"></span><span class="spark">✦</span></div>
      <div id="listPEF"></div>
    </div>
    <div>
      <div class="col-head vc"><h2>VC · 창투 · 신기사</h2><span class="cnt" id="cntVC"></span><span class="spark">✦</span></div>
      <div id="listVC"></div>
    </div>
  </div>
</div>

<script>
const API = "/api/dart";
let DATA = [], days = 7, q = "", timer = null;

const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function highlight(text, hits){
  let out = esc(text);
  const uniq = [...new Set(hits)].sort((a,b)=>b.length-a.length);
  for(const k of uniq) out = out.split(esc(k)).join(`<mark>${esc(k)}</mark>`);
  return out;
}
function fmtDate(d){ return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`; }
function weekday(d){
  const w = ["일","월","화","수","목","금","토"];
  return w[new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`).getDay()];
}
function todayKST(){
  return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10).replace(/-/g,"");
}
const CLS = {Y:"유가",K:"코스닥",N:"코넥스",E:"기타법인"};

function sectionHTML(items){
  if(!items.length) return `<div class="empty">해당 공시가 없습니다.</div>`;
  const today = todayKST();
  const groups = {};
  for(const it of items) (groups[it.rcept_dt] ||= []).push(it);
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  return dates.map(d=>`
    <div class="dayhead">${fmtDate(d)} (${weekday(d)}) · ${groups[d].length}건</div>
    ${groups[d].map(it=>`
      <a class="item ${d===today?"today":""}" href="${it.url}" target="_blank" rel="noopener">
        <div class="row1">
          ${CLS[it.corp_cls]?`<span class="badge b-mkt">${CLS[it.corp_cls]}</span>`:""}
          ${it.pef_entity?`<span class="badge b-house">하우스</span>`:""}
          <span class="corp">${highlight(it.corp_name, it.hits)}</span>
        </div>
        <div class="report">${highlight(it.report_nm, it.hits)}</div>
        <div class="row3">
          <span>제출: ${esc(it.flr_nm)}</span>
          ${it.rm?`<span>${esc(it.rm)}</span>`:""}
        </div>
      </a>`).join("")}
  `).join("");
}

function render(){
  const kw = q.trim();
  const filtered = kw
    ? DATA.filter(it => `${it.corp_name} ${it.report_nm} ${it.flr_nm}`.includes(kw))
    : DATA;
  const pef = filtered.filter(it=>it.category==="PEF");
  const vc  = filtered.filter(it=>it.category==="VC");
  $("#listPEF").innerHTML = sectionHTML(pef);
  $("#listVC").innerHTML  = sectionHTML(vc);
  $("#cntPEF").textContent = `${pef.length}건`;
  $("#cntVC").textContent  = `${vc.length}건`;
}

async function load(){
  const btn = $("#refresh");
  btn.classList.add("spin"); btn.textContent = "갱신 중";
  try{
    const r = await fetch(`${API}?days=${days}`);
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || "불러오기 실패");
    DATA = j.items;
    const t = new Date(j.fetched_at);
    $("#metaText").textContent =
      `${fmtDate(j.range.bgn)} ~ ${fmtDate(j.range.end)} · 전체 ${(j.total_count??j.scanned).toLocaleString()}건 스캔 · ` +
      `갱신 ${t.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`;
    render();
  }catch(e){
    $("#listPEF").innerHTML = `<div class="err">공시를 불러오지 못했습니다: ${esc(e.message)}<br>잠시 후 새로고침을 다시 눌러보세요.</div>`;
    $("#listVC").innerHTML = "";
    $("#metaText").textContent = ""; $("#cntPEF").textContent=""; $("#cntVC").textContent="";
  }finally{
    btn.classList.remove("spin"); btn.textContent = "새로고침";
  }
}

$("#refresh").onclick = load;
$("#q").addEventListener("input", e=>{ q = e.target.value; render(); });
document.querySelectorAll("#rangeToggle button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#rangeToggle button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); days = +b.dataset.d; load();
});
function setAuto(on){ clearInterval(timer); if(on) timer = setInterval(load, 5*60*1000); }
$("#auto").onchange = e=>setAuto(e.target.checked);
setAuto(true);
load();
</script>
</body>
</html>
